################################################################
# HTTP configuration
################################################################

http:
  # Middlewares definition
  middlewares:
    default-http-headers:
      headers:
        frameDeny: 'true'
        browserXssFilter: 'true'
        contentTypeNosniff: 'true'
        #contentSecurityPolicy: "default-src 'self'"
        forceSTSHeader: 'true'
        stsIncludeSubdomains: 'true'
        stsPreload: 'true'
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          Server: '' # Remove header

    default-ip-whitelist:
      ipAllowList:
        sourceRange:
          - '10.0.0.0/8'
          - '192.168.0.0/16'

    restricted:
      chain:
        middlewares:
          - default-http-headers@file
          - default-ip-whitelist@file
          - redirect-web-to-websecure@internal

    secured:
      chain:
        middlewares:
          - default-http-headers@file
          - redirect-web-to-websecure@internal

################################################################
# Global configuration
################################################################
global:
  # Checks for new releases to notify you if your version is out of date.
  #
  # Optional
  # Default: true
  #
  checkNewVersion: 'true'

  # Collects anonymous usage data throughout the Traefik lifecycle.
  #
  # Optional
  # Default: true
  #
  sendAnonymousUsage: 'false'

################################################################
# EntryPoints configuration
################################################################

# EntryPoints definition
#
# Optional
#
entryPoints:
  # HTTP
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  # HTTPS
  websecure:
    address: :443
    http:
      tls:
        certResolver: cloudflare
  # DNS (TCP)
  dns-tcp:
    address: :53/tcp
  # DNS (UDP)
  dns-udp:
    address: :53/udp

################################################################
# Traefik logs configuration
################################################################

# Traefik logs
# Enabled by default and log to stdout
#
# Optional
#
log:
  # Log level
  #
  # Optional
  # Default: "ERROR"
  #
  #level: DEBUG
  level: INFO

  # Sets the filepath for the traefik log. If not specified, stdout will be used.
  # Intermediate directories are created if necessary.
  #
  # Optional
  # Default: os.Stdout
  #
  #filePath: log/traefik.log

  # Format is either "json" or "common".
  #
  # Optional
  # Default: "common"
  #
  #format: json

################################################################
# Access logs configuration
################################################################

# Enable access logs
# By default it will write to stdout and produce logs in the textual
# Common Log Format (CLF), extended with additional fields.
#
# Optional
#
#accessLog:
  # Sets the file path for the access log. If not specified, stdout will be used.
  # Intermediate directories are created if necessary.
  #
  # Optional
  # Default: os.Stdout
  #
  #filePath: /path/to/log/log.txt

  # Format is either "json", "common", or "genericCLF".
  # - "common": Traefik's extended CLF format (default)
  # - "genericCLF": Standard CLF format compatible with standard log analyzers
  # - "json": JSON format for structured logging
  #
  # Optional
  # Default: "common"
  #
  #format: json
  #format: genericCLF

################################################################
# API and dashboard configuration
################################################################

# Enable API and dashboard
#
# Optional
#
api:
  # Enable the API in insecure mode
  #
  # Optional
  # Default: false
  #
  insecure: 'false'

  # Enabled Dashboard
  #
  # Optional
  # Default: true
  #
  dashboard: 'true'

################################################################
# Transport definition
################################################################

#
# Optional
#
serversTransport:
  # Allow services to serve their own self-signed certificates
  #
  # Optional
  #
  insecureSkipVerify: 'true'

################################################################
# Ping configuration
################################################################

# Enable ping
#ping:
  # Name of the related entry point
  #
  # Optional
  # Default: "traefik"
  #
  #entryPoint: traefik

################################################################
# Docker configuration backend
################################################################

providers:
  # Enable Docker configuration backend
  docker:
    # Docker server endpoint. Can be a tcp or a unix socket endpoint.
    #
    # Required
    # Default: "unix:///var/run/docker.sock"
    #
    endpoint: unix:///var/run/docker.sock

    # Default host rule.
    #
    # Optional
    # Default: "Host(`{{ normalize .Name }}`)"
    #
    defaultRule: Host(`{{ normalize .Name }}.docker.localhost`)

    # Expose containers by default in traefik
    #
    # Optional
    # Default: true
    #
    exposedByDefault: 'false'

    # Docker network where Traefik and TLS-protected origins are connected.
    #
    # Optional
    #
    network: traefik-vlan

  # Enable dynamic configuration by file
  file:
    # Directory where the configuration files will be loaded
    #
    directory: /etc/traefik/dynamic_conf

    # Enable file and directory monitoring from file system to capture changes
    # and automatically configure Traefik without requiring manual restart of
    # the docker container.
    #
    watch: 'true'

################################################################
# SSL certificate configuration
################################################################

# Certificate resolution configuration
#
# Optional
#
certificatesResolvers:
  # Supported certificate processor
  #
  # Optional
  #
  cloudflare:
    # Supported certificate provider
    #
    # Optional
    #
    acme:
      # Email registered as owner of the domain
      #
      # Required
      #
      email: adoremos162@gmail.com

      # File where private and public certificate data will be persisted
      #
      # Required
      #
      storage: /data/acme.json

      # Certificate authority endpoint that accepts SSL requests. Start with
      # staging first to reduce the risk of being blocked in production due to
      # request limits. Duration of block in production can reach up to 1 week.
      #
      # Required
      # Default: https://acme-v02.api.letsencrypt.org/directory
      #
      #caServer: https://acme-staging-v02.api.letsencrypt.org/directory # Staging
      caServer: https://acme-v02.api.letsencrypt.org/directory # Production

      # Method to certify ownership of the domain. One of the three supported
      # methods must be selected. DNS challenge does not require exposing the
      # traefik instance to the public internet.
      #
      # Required
      #
      dnsChallenge:
        # DNS provider to use.
        #
        # Required
        #
        provider: cloudflare

        # DNS servers to resolve the FQDN authority.
        #
        # Required
        #
        resolvers: ['1.1.1.1:53', '1.0.0.1:53']

        # Propragation settings
        #
        # Required
        #
        propagation:
          # Disables the challenge TXT record propagation checks, before
          # notifying ACME that the DNS challenge is ready. Please note that
          # disabling checks can prevent the challenge from succeeding.
          #
          # Optional
          # Default: false
          #
          disableChecks: 'true'

          # By default, the provider will verify the TXT DNS challenge record
          # before letting ACME verify. If delayBeforeCheck is greater than
          # zero, this check is delayed for the configured duration in seconds.
          # This is Useful if internal networks block external DNS queries.
          #
          # Optional
          # Default: 0s
          #
          delayBeforeChecks: 60s
